<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Architech — Cadastro</title>
  <link rel="stylesheet" href="assets/css/background.css" />
  <link rel="stylesheet" href="assets/css/cadastro.css" />
</head>
<body>

  <div class="architech-bg">

    <div class="bg-icons">
      <div class="bg-icon bg-icon--group">
        <img src="assets/images/icon-group.png" alt="" />
      </div>
      <div class="bg-icon bg-icon--html">
        <img src="assets/images/icon-html5.png" alt="" />
      </div>
      <div class="bg-icon bg-icon--css">
        <img src="assets/images/icon-css3.png" alt="" />
      </div>
      <div class="bg-icon bg-icon--js-right">
        <img src="assets/images/icon-js.png" alt="" />
      </div>
      <div class="bg-icon bg-icon--js-left">
        <img src="assets/images/icon-js.png" alt="" />
      </div>
      <div class="bg-icon bg-icon--play">
        <img src="assets/images/icon-polygon.png" alt="" />
      </div>
    </div>

    <a href="index.html" class="btn-back">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      Voltar para principal
    </a>

    <div class="page-content">

      <div class="logo-wrapper">
        <div class="logo-circle">
          <img src="assets/images/logo-a.png" alt="Architech" />
        </div>
        <span class="logo-name">Architech</span>
      </div>

      <h1 class="welcome-title">Bem-vindo(a)!</h1>

      <form id="l oginForm" class="form">

        <!-- coluna única ocupando tudo -->
        <div class="col" style="grid-column: span 2; max-width:400px; margin:auto;">

            <label>E-mail</label>
            <input type="email" id="email" placeholder="Digite seu e-mail" required>

            <label>Senha</label>
            <div class="input-icon">
                <input type="password" id="senha" placeholder="********" required>
                <span onclick="toggleSenha()">👁</span>
            </div>

            <div style="text-align:right; font-size:13px; margin-top:-10px;">
                <a href="#" style="text-decoration:none;">Esqueci minha senha</a>
            </div>

        </div>

    

    </form>



      <button class="btn-submit" type="button" onclick="cadastrar()">Volte a aprender!</button>

      <p class="msg-feedback" id="feedback"></p>

      <p class="login-link">
        Ainda não possui uma conta? <a href="cadastro.html">Se cadastre!</a>
      </p>

    </div>

  </div>

  <script>
    function toggleSenha() {
        const input = document.getElementById('senha');
        input.type = input.type === 'password' ? 'text' : 'password';
    }
    
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
    
        const email = document.getElementById('email').value;
        const senha = document.getElementById('senha').value;
    
        const res = await fetch('login.php', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, senha })
        });
    
        const data = await res.json();
    
        if (data.sucesso) {
            alert('Login realizado!');
            window.location.href = 'dashboard.html';
        } else {
            alert(data.mensagem);
        }
    });
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Architech - Cadastro</title>

<link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;600&family=Urbanist:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="bg">

<button class="back">← Voltar para principal</button>

<div class="card">

<div class="logo">
  <div class="logo-circle">
    <div class="logo-inner">A</div>
  </div>
  <h1>ARCHITECH</h1>
</div>

<h2>Bem-vindo(a)!</h2>

<form class="form">

<div class="col">
<label>Nome completo</label>
<input type="text" required>

<label>E-mail</label>
<input type="email" required>

<label>Senha</label>
<div class="input-icon">
<input type="password" id="s1" required>
<span onclick="toggle('s1')">👁</span>
</div>

<label>Confirmar senha</label>
<div class="input-icon">
<input type="password" id="s2" required>
<span onclick="toggle('s2')">👁</span>
</div>
</div>

<div class="col">
<label>Instituição de ensino</label>
<select required>
<option value="">Selecione</option>
<option>Escola</option>
<option>Faculdade</option>
</select>

<label>Nível de conhecimento</label>
<div class="radio">
<label><input type="radio" name="n" required> Iniciante</label>
<label><input type="radio" name="n"> Intermediário</label>
<label><input type="radio" name="n"> Avançado</label>
</div>
</div>

</form>

<button class="main">Comece a aprender!</button>

<p class="login">Já tem uma conta?<br><a href="#">Entre</a></p>

</div>
</div>

<script src="script.js"></script>
</body>
</html>

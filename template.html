<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Architech — Template</title>
  <link rel="stylesheet" href="assets/css/background.css" />
  <!--
    ┌─────────────────────────────────────────────┐
    │  Adicione aqui o CSS específico da sua page │
    │  Ex: <link rel="stylesheet" href="...css">  │
    └─────────────────────────────────────────────┘
  -->
</head>
<body>

  <!-- ╔══════════════════════════════════════════╗
       ║   BACKGROUND ARCHITECH — NÃO REMOVA     ║
       ╚══════════════════════════════════════════╝ -->
  <div class="architech-bg">

    <!-- Ícones flutuantes decorativos do fundo -->
    <div class="bg-icons">

      <!-- Ícone HTML5 / losango — esquerda, meio -->
      <svg class="bg-icon bg-icon--html" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
        <polygon points="40,6 74,28 74,52 40,74 6,52 6,28" stroke-width="3" fill="none"/>
        <text x="40" y="46" text-anchor="middle" font-size="22" font-weight="700"
              font-family="monospace" stroke="none" fill="rgba(176,224,230,0.5)">&lt;/&gt;</text>
      </svg>

      <!-- Ícone CSS3 — direita, meio-alto -->
      <svg class="bg-icon bg-icon--css" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
        <rect x="8" y="6" width="64" height="68" rx="4" stroke-width="3" fill="none"/>
        <text x="40" y="30" text-anchor="middle" font-size="13" font-weight="700"
              font-family="monospace" stroke="none" fill="rgba(176,224,230,0.5)">CSS</text>
        <text x="40" y="52" text-anchor="middle" font-size="22" font-weight="900"
              font-family="monospace" stroke="none" fill="rgba(176,224,230,0.4)">3</text>
      </svg>

      <!-- Ícone JS — canto direito baixo -->
      <svg class="bg-icon bg-icon--js-right" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
        <rect x="6" y="6" width="68" height="68" rx="4" stroke-width="3" fill="none"/>
        <text x="40" y="30" text-anchor="middle" font-size="13" font-weight="700"
              font-family="monospace" stroke="none" fill="rgba(176,224,230,0.5)">JS</text>
        <text x="40" y="56" text-anchor="middle" font-size="26" font-weight="900"
              font-family="monospace" stroke="none" fill="rgba(176,224,230,0.4)">JS</text>
      </svg>

      <!-- Ícone JS — canto esquerdo baixo (menor) -->
      <svg class="bg-icon bg-icon--js-left" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
        <rect x="6" y="6" width="68" height="68" rx="4" stroke-width="3" fill="none"/>
        <text x="40" y="48" text-anchor="middle" font-size="26" font-weight="900"
              font-family="monospace" stroke="none" fill="rgba(176,224,230,0.35)">JS</text>
      </svg>

      <!-- Seta / play — esquerda, baixo -->
      <svg class="bg-icon bg-icon--play" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
        <polygon points="4,4 4,56 56,30" stroke-width="3" fill="none"/>
      </svg>

    </div>
    <!-- /bg-icons -->

    <!-- ──────────────────────────────────────────
         BOTÃO "VOLTAR PARA PRINCIPAL"
         Remova ou ajuste conforme a página
    ─────────────────────────────────────────── -->
    <a href="#" class="btn-back">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      Voltar para principal
    </a>

    <!-- ╔══════════════════════════════════════════╗
         ║   SEU CONTEÚDO AQUI ↓                   ║
         ╚══════════════════════════════════════════╝ -->
    <div class="page-content">

      <!--
        ✏️  COLE SEU HTML AQUI
        Exemplo: formulário de cadastro, login, dashboard, etc.
      -->

    </div>
    <!-- /page-content -->

  </div>
  <!-- /architech-bg -->

  <!--
    ┌─────────────────────────────────────────────┐
    │  Adicione aqui o JS específico da sua page  │
    │  Ex: <script src="assets/js/cadastro.js">   │
    └─────────────────────────────────────────────┘
  -->
</body>
</html>
